version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bsn-site-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bsn_site_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bsn_site_password}
      POSTGRES_DB: ${POSTGRES_DB:-bsn_site_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bsn_site_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bsn-site-network

  redis:
    image: redis:7-alpine
    container_name: bsn-site-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bsn-site-network

