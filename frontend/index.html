  <body class="min-h-screen bg-background font-sans antialiased">
    <!-- Loading screen -->
    <div id="loading" class="fixed inset-0 z-50 bg-background flex items-center justify-center">
      <div class="flex flex-col items-center gap-4">
        <div class="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
        <p class="text-sm text-muted-foreground">Carregando BSN Solution...</p>
      </div>
    </div>
    
    <!-- React root -->
    <div id="root"></div>
    
    <!-- Module script -->
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Hide loading when page loads -->
    <script>
      window.addEventListener('load', function() {
        const loading = document.getElementById('loading');
        if (loading) {
          loading.style.transition = 'opacity 0.3s ease-out';
          loading.style.opacity = '0';
          setTimeout(() => {
            loading.remove();
          }, 300);
        }
      });
      
      // Analytics - Track page load time
      window.addEventListener('load', function() {
        if ('performance' in window) {
          const loadTime = performance.now();
          console.log(`Page loaded in ${Math.round(loadTime)}ms`);
        }
      });
      
      // Prevent FOUC (Flash of Unstyled Content)
      document.documentElement.classList.add('loading');
      window.addEventListener('DOMContentLoaded', function() {
        document.documentElement.classList.remove('loading');
      });
    </script>
    
    <!-- Accessibility: Skip to main content -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:px-4 focus:py-2 focus:bg-primary focus:text-primary-foreground focus:rounded-md">
      Pular para o conteúdo principal
    </a>
  </body>
